interface:
  display_name: "Create Epic Sprint"
  short_description: "Scaffold next repo sprint docs"
  default_prompt: "Use $create-epic-sprint to create the next sprint for a PRD feature under docs/prd/<feature-slug>/sprints with category-based tickets for UI, BACKEND, and INFRA, enforcing that the previous sprint is DONE and inferring whether the sprint is implementation-only or the final docs/thesis sprint. Do not create thesis or docs tickets by default; only create them when the PRD, epic, implemented evidence, or user-facing documentation impact justifies a final documentation sprint. The manual QA ticket must mention updating the feature epic.md to Status: DONE when it closes the whole epic after successful validation."
