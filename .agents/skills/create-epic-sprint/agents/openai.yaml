interface:
  display_name: "Create Epic Sprint"
  short_description: "Scaffold next repo sprint docs"
  default_prompt: "Use $create-epic-sprint to create the next sprint for a PRD feature under docs/prd/<feature-slug>/sprints with category-based tickets for UI, BACKEND, and INFRA, enforcing that the previous sprint is DONE and ending with cleanup, manual QA, and thesis update tickets. The manual QA ticket must mention updating the feature epic.md to Status: DONE when it closes the whole epic after successful validation, and the final thesis update ticket must incorporate sprint evidence with academic rigor and high-level implementation detail."
